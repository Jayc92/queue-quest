        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        terminal: {

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');

        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0a0e14;
            color: #e6edf3;
            -webkit-tap-highlight-color: transparent;
        }

        /* Reusable icon wrapper — deliberate inline-block */
        .qq-icon { display: inline-block; line-height: 0; }
        .qq-icon > svg { width: 100%; height: 100%; }

        /* Grid background */
        .grid-bg {
            background-image:
                linear-gradient(rgba(34, 211, 238, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(34, 211, 238, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        @media (prefers-reduced-motion: no-preference) {
            @keyframes pulse-line {
                0% { transform: translateX(-100%); opacity: 0; }
                50% { opacity: 1; }
                100% { transform: translateX(100%); opacity: 0; }
            }
            @keyframes packet-flow {
                0% { transform: translateX(-20px); opacity: 0; }
                10% { opacity: 1; }
                90% { opacity: 1; }
                100% { transform: translateX(calc(100vw + 20px)); opacity: 0; }
            }
            @keyframes scan {
                0% { transform: translateY(-100%); }
                100% { transform: translateY(100%); }
            }
            @keyframes blink {
                0%, 50%, 100% { opacity: 1; }
                25%, 75% { opacity: 0.5; }
            }
            @keyframes slide-up {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
            @keyframes waveform {
                0%, 100% { transform: scaleY(0.3); }
                50% { transform: scaleY(1); }
            }
            @keyframes flash-cyan {
                0% { background-color: rgba(34, 211, 238, 0.35); }
                100% { background-color: transparent; }
            }
            @keyframes flash-amber {
                0% { background-color: rgba(251, 191, 36, 0.35); }
                100% { background-color: transparent; }
            }
            @keyframes flash-red {
                0% { background-color: rgba(239, 68, 68, 0.35); }
                100% { background-color: transparent; }
            }
            @keyframes flash-green {
                0% { background-color: rgba(34, 197, 94, 0.35); }
                100% { background-color: transparent; }
            }
            @keyframes pulse-node {
                0%, 100% { transform: scale(1); opacity: 0.9; }
                50% { transform: scale(1.15); opacity: 1; }
            }
            @keyframes queue-flow {
                0% { transform: translateX(0); opacity: 0; }
                20% { opacity: 1; }
                80% { opacity: 1; }
                100% { transform: translateX(120px); opacity: 0; }
            }
            @keyframes queue-flow-lane {
                0% { transform: translateX(-8px); opacity: 0; }
                20% { opacity: 1; }
                80% { opacity: 1; }
                100% { transform: translateX(100%); opacity: 0; }
            }
            @keyframes countdown-pulse {
                0%, 100% { color: #f87171; }
                50% { color: #ef4444; text-shadow: 0 0 6px rgba(239, 68, 68, 0.6); }
            }
            .animate-pulse-line { animation: pulse-line 4s ease-in-out infinite; }
            .animate-packet { animation: packet-flow 5s linear infinite; }
            .animate-scan { animation: scan 6s linear infinite; }
            .animate-blink { animation: blink 2s ease-in-out infinite; }
            .animate-slide-up { animation: slide-up 0.4s ease-out forwards; opacity: 0; }
            .animate-waveform { animation: waveform 1.5s ease-in-out infinite; }
            .flash-cyan { animation: flash-cyan 0.7s ease-out; }
            .flash-amber { animation: flash-amber 0.7s ease-out; }
            .flash-red { animation: flash-red 0.7s ease-out; }
            .flash-green { animation: flash-green 0.7s ease-out; }
            .animate-pulse-node { animation: pulse-node 1.5s ease-in-out infinite; }
            .animate-queue-flow { animation: queue-flow-lane 3s linear infinite; }
            .animate-countdown { animation: countdown-pulse 1.5s ease-in-out infinite; }
        }
        @media (prefers-reduced-motion: reduce) {
            .animate-slide-up { opacity: 1 !important; }
        }

        /* Custom range slider with visible fill */
        .slider-input {
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            cursor: pointer;
            width: 100%;
            height: 44px;
            margin: 0;
            padding: 0;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
        }
        .slider-input::-webkit-slider-runnable-track { height: 44px; background: transparent; border: none; }
        .slider-input::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 28px;
            height: 28px;
            background: #22d3ee;
            border: 2px solid #0a0e14;
            border-radius: 6px;
            margin-top: 8px;
            box-shadow: 0 0 12px rgba(34, 211, 238, 0.6), 0 0 0 1px #22d3ee;
            cursor: grab;
        }
        .slider-input::-webkit-slider-thumb:active { cursor: grabbing; background: #67e8f9; }
        .slider-input::-moz-range-track { height: 44px; background: transparent; border: none; }
        .slider-input::-moz-range-thumb {
            width: 28px; height: 28px; background: #22d3ee;
            border: 2px solid #0a0e14; border-radius: 6px;
            box-shadow: 0 0 12px rgba(34, 211, 238, 0.6), 0 0 0 1px #22d3ee;
            cursor: grab;
        }
        .slider-input:focus { outline: none; }
        .slider-input:focus-visible::-webkit-slider-thumb {
            box-shadow: 0 0 0 4px rgba(34, 211, 238, 0.4), 0 0 12px rgba(34, 211, 238, 0.6);
        }
        .slider-input:focus-visible::-moz-range-thumb {
            box-shadow: 0 0 0 4px rgba(34, 211, 238, 0.4), 0 0 12px rgba(34, 211, 238, 0.6);
        }

        .slider-track {
            position: relative;
            height: 12px;
            background: #1c2128;
            border: 1px solid #30363d;
            border-radius: 6px;
            top: 16px;
            overflow: hidden;
        }
        .slider-fill {
            height: 100%;
            background: linear-gradient(90deg, #0891b2 0%, #22d3ee 100%);
            border-radius: 5px 0 0 5px;
            transition: width 0.15s ease-out;
            box-shadow: 0 0 8px rgba(34, 211, 238, 0.5);
        }

        button:focus-visible, [tabindex]:focus-visible {
            outline: 2px solid #22d3ee;
            outline-offset: 2px;
        }

        .glow-cyan { box-shadow: 0 0 20px rgba(34, 211, 238, 0.3), inset 0 0 20px rgba(34, 211, 238, 0.05); }
        .glow-amber { box-shadow: 0 0 20px rgba(251, 191, 36, 0.3); }
        .glow-red { box-shadow: 0 0 20px rgba(239, 68, 68, 0.3); }

        // ============================================================

        //     resale: 'face', waveCount: 4, waveInterval: 20, waitingRoomTime: 2,
        //     presalePercent: 25, accessiblePercent: 8 } => ~60/55 CLEAR

        const LEVELS = [
            {

        // ============================================================
        // SECTION 3 · UTILITY FUNCTIONS
        // ============================================================

        function getRank(score, target) {
            const diff = score - target;
            if (diff < -15) return { key: 'fail',      label: 'FAILED',       color: 'red',   tier: 0 };
            if (diff < 0)   return { key: 'near',      label: 'NEAR MISS',    color: 'amber', tier: 1 };
            if (diff < 10)  return { key: 'pass',      label: 'CLEAR',        color: 'green', tier: 2 };
            if (diff < 20)  return { key: 'excellent', label: 'STRONG CLEAR', color: 'cyan',  tier: 3 };
            return              { key: 'mastered', label: 'MASTERED',     color: 'gold',  tier: 4 };
        }

        function nextRankThreshold(currentScore, target) {
            const diff = currentScore - target;
            if (diff < -15) return { needed: target - currentScore, label: 'CLEAR' };
            if (diff < 0)   return { needed: target - currentScore, label: 'CLEAR' };
            if (diff < 10)  return { needed: (target + 10) - currentScore, label: 'STRONG CLEAR' };
            if (diff < 20)  return { needed: (target + 20) - currentScore, label: 'MASTERED' };
            return null; // already mastered
        }

        function formatNumber(n) {
            if (n >= 1000000) return `${(n/1000000).toFixed(1)}M`;
            if (n >= 1000) return `${(n/1000).toFixed(0)}K`;
            return n.toString();
        }

        // ============================================================
        // SECTION 4 · SIMULATION LOGIC
        // ============================================================

        function runSimulation(level, config) {
            const { seats, demand, botPressure, resalePressure, serverRisk, weights } = level;
            const baseBotAttempts = Math.floor(demand * botPressure);

            const botDetectionEffectiveness = { 'low': 0.20, 'medium': 0.50, 'high': 0.78, 'aggressive': 0.94 }[config.botDetection];
            const botDetectionFriction     = { 'low': 0.02, 'medium': 0.06, 'high': 0.14, 'aggressive': 0.30 }[config.botDetection];
            const verificationEffectiveness = { 'none': 0, 'basic': 0.25, 'verified': 0.75 }[config.verification];
            const verificationFriction     = { 'none': 0, 'basic': 0.04, 'verified': 0.18 }[config.verification];

            const combinedBotBlock = Math.min(0.98, botDetectionEffectiveness + verificationEffectiveness * 0.3);
            const botsBlocked = Math.floor(baseBotAttempts * combinedBotBlock);
            const botsGotThrough = baseBotAttempts - botsBlocked;

            const avgBotTickets = Math.max(1, config.purchaseLimit * 0.8);
            const botTickets = Math.min(seats * 0.4, botsGotThrough * avgBotTickets / config.purchaseLimit);
            const waitingRoomHours = config.waitingRoomTime;
            const botPreparationBonus = Math.max(0, (waitingRoomHours - 1) * 0.03);
            // Short-notice events (Playoff especially) punish long waiting rooms harder
            const shortNoticePenalty = level.id === 4 ? Math.max(0, (waitingRoomHours - 2) * 0.02) : 0;
            const adjustedBotTickets = botTickets * (1 + botPreparationBonus + shortNoticePenalty);

            // Server load — wave count acts as pressure release valve, but excess waves stress the system
            const baseLoad = demand / seats;
            const excessWaves = Math.max(0, config.waveCount - 4);
            const waveLoadMultiplier = config.waveCount > 1
                ? Math.max(0.35, 1 - (config.waveCount - 1) * 0.16 + excessWaves * 0.18)
                : 1;
            const intervalLoadReduction = config.waveCount > 1 ? Math.min(0.12, (config.waveInterval - 5) * 0.003) : 0;
            const presaleLoadReduction = config.presalePercent * 0.005;
            const serverScenarioLoad = serverRisk * 1.5;
            const serverLoad = Math.min(100, (baseLoad * 1.7 * waveLoadMultiplier * (1 - intervalLoadReduction) - presaleLoadReduction + serverScenarioLoad) * 9);
            const excessWavePenalty = config.waveCount > 5 ? (config.waveCount - 5) * 6 : 0;
            const longWaitPenalty = config.waitingRoomTime > 12 ? (config.waitingRoomTime - 12) * 0.8 : 0;
            const siteStability = Math.max(20, Math.min(100, 128 - serverLoad * 0.72 - excessWavePenalty - longWaitPenalty));

            const totalFriction = botDetectionFriction + verificationFriction;
            const checkoutSuccessRate = Math.max(40, Math.min(98,
                siteStability * 0.6 + (100 - totalFriction * 100) * 0.4 - (config.waveCount > 4 ? 3 : 0)
            ));

            const realFanDemand = demand - baseBotAttempts;
            const effectiveRealFans = realFanDemand * (1 - totalFriction) * (checkoutSuccessRate / 100);

            const presaleTickets = Math.floor(seats * config.presalePercent / 100);
            const accessibleTickets = Math.floor(seats * config.accessiblePercent / 100);
            const publicTickets = seats - presaleTickets - accessibleTickets;

            const ticketsToRealFans = Math.min(
                publicTickets - Math.floor(adjustedBotTickets),
                effectiveRealFans * (config.purchaseLimit / 4)
            );
            const realFansServed = Math.max(0, Math.floor(ticketsToRealFans / 2)) + presaleTickets + accessibleTickets;

            // Satisfaction
            let satisfaction = 62;
            satisfaction += (realFansServed / seats) * 30;
            satisfaction += (checkoutSuccessRate - 50) * 0.3;
            satisfaction += config.accessiblePercent * 0.6;
            satisfaction += config.waveCount > 1 && config.waveCount <= 4 ? 10 : 0;
            satisfaction -= totalFriction * 40;
            satisfaction -= (100 - siteStability) * 0.3;
            satisfaction -= waitingRoomHours > 4 ? (waitingRoomHours - 4) * 2 : 0;
            satisfaction -= config.verification === 'verified' ? 4 : 0;
            satisfaction += { 'none': -6, 'caps': 4, 'face': 10, 'no_resale': -2 }[config.resale];
            // Non-transferable extra hurts when it's not needed
            if (config.resale === 'no_resale' && resalePressure < 0.6) satisfaction -= 4;
            // Playoff amplifies resale satisfaction impact
            if (level.id === 4) {
                satisfaction += { 'none': -6, 'caps': 2, 'face': 6, 'no_resale': 0 }[config.resale];
            }
            satisfaction = Math.max(20, Math.min(100, satisfaction));

            // Fairness
            let fairness = 58;
            fairness += (realFansServed / seats) * 20;
            fairness += (botsBlocked / Math.max(1, baseBotAttempts)) * 15;
            fairness += config.accessiblePercent * 1.2;
            // Presale over 30% is progressively harmful; over 40% is severe
            fairness -= config.presalePercent > 30 ? (config.presalePercent - 30) * 0.6 : 0;
            fairness -= config.presalePercent > 40 ? (config.presalePercent - 40) * 0.8 : 0;
            fairness += verificationEffectiveness * 10;
            fairness += { 'none': -12, 'caps': 4, 'face': 12, 'no_resale': 8 }[config.resale];
            // High resale pressure levels reward strict resale more
            if (resalePressure > 0.7) {
                fairness += { 'none': -6, 'caps': 2, 'face': 5, 'no_resale': 4 }[config.resale];
            }
            fairness += (8 - config.purchaseLimit) * 2;
            // Festival rewards accessibility coverage more
            if (level.id === 3) fairness += config.accessiblePercent * 0.5;
            fairness = Math.max(20, Math.min(100, fairness));

            const fansServedPct = Math.min(100, (realFansServed / seats) * 100);
            const botsBlockedPct = (botsBlocked / Math.max(1, baseBotAttempts)) * 100;

            const overallScore = Math.round(
                fansServedPct    * weights.fans +
                botsBlockedPct   * weights.bots +
                checkoutSuccessRate * weights.checkout +
                satisfaction     * weights.satisfaction +
                siteStability    * weights.stability +
                fairness         * weights.fairness
            );

            const leverImpacts = analyzeLevers(config, {
                botsBlocked, baseBotAttempts, botsGotThrough,
                checkoutSuccessRate, satisfaction, siteStability, fairness,
                serverLoad, totalFriction, fansServedPct,
                realFansServed, seats, presaleTickets, accessibleTickets, publicTickets,
                overallScore
            }, level);

            // Simulation trace — event-style summary tied to actual outcomes
            const trace = [];
            const peakLoad = Math.round(serverLoad);
            const peakWave = config.waveCount > 1 ? Math.min(2, config.waveCount) : 1;
            trace.push({ label: 'Peak load', detail: `Server load reached ${peakLoad}%${config.waveCount > 1 ? ` during Wave ${peakWave}` : ' at open'}.`, tone: peakLoad > 70 ? 'red' : peakLoad > 45 ? 'amber' : 'green' });
            const blockPct = Math.round((botsBlocked / Math.max(1, baseBotAttempts)) * 100);
            trace.push({ label: 'Bot filter', detail: `Blocked ${blockPct}%${blockPct < 100 ? `; ${100-blockPct}% reached checkout` : ''}.`, tone: blockPct >= 80 ? 'green' : blockPct >= 55 ? 'amber' : 'red' });
            trace.push({ label: 'Fans admitted', detail: `${Math.round(realFansServed).toLocaleString()} of ${seats.toLocaleString()} seats (${Math.round(fansServedPct)}%).`, tone: fansServedPct > 50 ? 'green' : fansServedPct > 25 ? 'amber' : 'red' });
            if (checkoutSuccessRate < 65) {
                trace.push({ label: 'Checkout bottleneck', detail: `Only ${Math.round(checkoutSuccessRate)}% of fans completed checkout — timeouts and friction cost seats.`, tone: 'red' });
            } else {
                trace.push({ label: 'Checkout', detail: `${Math.round(checkoutSuccessRate)}% completed checkout successfully.`, tone: 'green' });
            }
            if (config.presalePercent > 30) {
                trace.push({ label: 'Inventory pressure', detail: `Public pool tightened after ${config.presalePercent}% presale allocation.`, tone: 'amber' });
            } else if (config.presalePercent > 0) {
                trace.push({ label: 'Inventory split', detail: `${config.presalePercent}% presale absorbed early demand.`, tone: 'green' });
            }

            return {
                realFansServed: Math.round(realFansServed),
                totalSeats: seats,
                botsBlocked: Math.round(botsBlocked),
                botsGotThrough: Math.round(botsGotThrough),
                botTickets: Math.round(adjustedBotTickets),
                checkoutSuccessRate: Math.round(checkoutSuccessRate),
                satisfaction: Math.round(satisfaction),
                siteStability: Math.round(siteStability),
                fairness: Math.round(fairness),
                serverLoad: Math.round(serverLoad),
                fansServedPct: Math.round(fansServedPct),
                botsBlockedPct: Math.round(botsBlockedPct),
                overallScore: Math.min(100, Math.max(0, overallScore)),
                leverImpacts,
                trace,
                passed: overallScore >= level.parScore,
                config
            };
        }

        function analyzeLevers(config, m, level) {
            const impacts = [];

            // Bot Detection
            if (config.botDetection === 'low') {
                impacts.push({ lever: 'Bot Detection', impact: -18 - level.botPressure * 25, label: 'Basic bot defense',
                    why: 'Weak detection let too many bots through — fairness collapsed.' });
            } else if (config.botDetection === 'aggressive' && m.satisfaction < 60) {
                impacts.push({ lever: 'Bot Detection', impact: -14, label: 'Maximum bot defense',
                    why: 'Aggressive screening frustrated legitimate fans with false positives.' });
            } else if (config.botDetection === 'aggressive') {
                impacts.push({ lever: 'Bot Detection', impact: 6, label: 'Maximum bot defense',
                    why: 'Heavy defense paid off against high bot pressure.' });
            } else if (config.botDetection === 'high') {
                impacts.push({ lever: 'Bot Detection', impact: 15, label: 'Enhanced detection',
                    why: 'Behavioral analysis caught most bots without excessive friction.' });
            } else {
                impacts.push({ lever: 'Bot Detection', impact: level.botPressure > 0.4 ? -10 : 6, label: 'Standard detection',
                    why: level.botPressure > 0.4 ? 'Standard detection was insufficient at this bot pressure.' : 'Standard detection was proportional to the threat.' });
            }

            // Verification
            if (config.verification === 'none') {
                impacts.push({ lever: 'Verification', impact: -10, label: 'No verification',
                    why: 'Open access let fake accounts proliferate.' });
            } else if (config.verification === 'verified' && level.botPressure < 0.4) {
                impacts.push({ lever: 'Verification', impact: -8, label: 'ID verification',
                    why: 'ID requirements were overkill for this threat level and hurt satisfaction.' });
            } else if (config.verification === 'verified') {
                impacts.push({ lever: 'Verification', impact: 12, label: 'ID verification',
                    why: 'Strong identity check was warranted at this scale.' });
            } else {
                impacts.push({ lever: 'Verification', impact: 6, label: 'Email verification',
                    why: 'Email verification balanced friction with security.' });
            }

            // Entry Waves
            const highDemand = level.demand / level.seats > 6;
            if (config.waveCount === 1 && highDemand) {
                impacts.push({ lever: 'Entry Waves', impact: -20, label: 'Single wave',
                    why: 'No staggering — the whole demand hit at once and stability collapsed.' });
            } else if (config.waveCount >= 2 && config.waveCount <= 4) {
                impacts.push({ lever: 'Entry Waves', impact: 15, label: `${config.waveCount} waves`,
                    why: 'Staggered entry distributed server load and gave more fans a fair shot.' });
            } else if (config.waveCount > 5) {
                impacts.push({ lever: 'Entry Waves', impact: -10, label: `${config.waveCount} waves`,
                    why: 'Too many waves caused repeated stress and prolonged uncertainty for late fans.' });
            } else {
                impacts.push({ lever: 'Entry Waves', impact: 3, label: `${config.waveCount} waves`,
                    why: 'Wave count was reasonable but not optimal.' });
            }

            // Purchase Limit
            if (config.purchaseLimit >= 6) {
                impacts.push({ lever: 'Purchase Limit', impact: -10, label: `${config.purchaseLimit} tix max`,
                    why: 'High limits let groups and bots grab large blocks.' });
            } else if (config.purchaseLimit <= 2) {
                impacts.push({ lever: 'Purchase Limit', impact: 8, label: `${config.purchaseLimit} tix max`,
                    why: 'Tight limits spread tickets across more fans and improved fairness.' });
            } else {
                impacts.push({ lever: 'Purchase Limit', impact: 5, label: `${config.purchaseLimit} tix max`,
                    why: 'Moderate limit balanced groups and fairness.' });
            }

            // Resale
            if (config.resale === 'none' && level.resalePressure > 0.5) {
                impacts.push({ lever: 'Resale Policy', impact: -16, label: 'Open resale market',
                    why: 'No restrictions enabled immediate scalper markup — fairness collapsed.' });
            } else if (config.resale === 'face') {
                impacts.push({ lever: 'Resale Policy', impact: 13, label: 'Face-value only',
                    why: 'Face-value resale maintained fair pricing across the market.' });
            } else if (config.resale === 'no_resale') {
                impacts.push({ lever: 'Resale Policy', impact: 4, label: 'Non-transferable',
                    why: 'Strict anti-scalp but blocked legitimate transfers.' });
            } else {
                impacts.push({ lever: 'Resale Policy', impact: 6, label: 'Price-capped resale',
                    why: 'Price caps reduced extreme markups.' });
            }

            // Presale
            if (config.presalePercent > 40) {
                impacts.push({ lever: 'Presale Allocation', impact: -14, label: `${config.presalePercent}% presale`,
                    why: 'Large presale left general public feeling shut out — fairness dropped.' });
            } else if (config.presalePercent >= 15 && config.presalePercent <= 30) {
                impacts.push({ lever: 'Presale Allocation', impact: 6, label: `${config.presalePercent}% presale`,
                    why: 'Moderate presale rewarded loyalty without excluding public sale.' });
            } else if (config.presalePercent === 0) {
                impacts.push({ lever: 'Presale Allocation', impact: -3, label: 'No presale',
                    why: 'No presale concentrated all chaos in the public sale.' });
            } else {
                impacts.push({ lever: 'Presale Allocation', impact: 2, label: `${config.presalePercent}% presale`,
                    why: 'Light presale had minimal effect on public sale pressure.' });
            }

            // Accessibility
            if (config.accessiblePercent >= 5) {
                impacts.push({ lever: 'Accessibility', impact: 8, label: `${config.accessiblePercent}% accessible`,
                    why: 'Reserved accessible inventory improved fairness coverage.' });
            } else {
                impacts.push({ lever: 'Accessibility', impact: -3, label: `${config.accessiblePercent}% accessible`,
                    why: 'Minimal accessible reservation limited coverage.' });
            }

            // Waiting Room
            const isShortNotice = level.id === 4;
            if (config.waitingRoomTime > 6) {
                impacts.push({ lever: 'Waiting Room', impact: isShortNotice ? -10 : -6, label: `${config.waitingRoomTime}h early`,
                    why: isShortNotice ? 'Long lead time compressed short-notice demand into chaos.' : 'Long lead time gave bots more setup time.' });
            } else if (config.waitingRoomTime < 1) {
                impacts.push({ lever: 'Waiting Room', impact: -4, label: `${config.waitingRoomTime}h early`,
                    why: 'Last-minute opening created a rush.' });
            } else {
                impacts.push({ lever: 'Waiting Room', impact: 4, label: `${config.waitingRoomTime}h early`,
                    why: 'Reasonable lead time without giving bots too much prep.' });
            }

            return impacts;
        }

        // Live projections — derives from React config state
        function calculateProjections(level, config) {
            const { seats, demand, botPressure, resalePressure, serverRisk } = level;

            const botDetectionEff  = { 'low': 0.20, 'medium': 0.50, 'high': 0.78, 'aggressive': 0.94 }[config.botDetection];
            const botDetectionFric = { 'low': 0.02, 'medium': 0.06, 'high': 0.14, 'aggressive': 0.30 }[config.botDetection];
            const verifEff  = { 'none': 0, 'basic': 0.25, 'verified': 0.75 }[config.verification];
            const verifFric = { 'none': 0, 'basic': 0.04, 'verified': 0.18 }[config.verification];

            const botBlock = Math.min(0.98, botDetectionEff + verifEff * 0.3);
            const botExposure = Math.round((1 - botBlock) * 100);
            const fanFriction = Math.round((botDetectionFric + verifFric) * 100);

            const baseLoad = demand / seats;
            const waveLoadMultiplier = config.waveCount > 1
                ? Math.max(0.32, 1 - (config.waveCount - 1) * 0.16 + Math.max(0, config.waveCount - 5) * 0.10)
                : 1;
            const loadRisk = Math.min(100, Math.round((baseLoad * 1.7 * waveLoadMultiplier + serverRisk * 15) * 4));

            const presaleTickets = Math.floor(seats * config.presalePercent / 100);
            const accessibleTickets = Math.floor(seats * config.accessiblePercent / 100);
            const publicInventory = seats - presaleTickets - accessibleTickets;
            const publicPercent = Math.round((publicInventory / seats) * 100);

            let fairness = 58;
            fairness += verifEff * 10;
            fairness += { 'none': -12, 'caps': 4, 'face': 12, 'no_resale': 8 }[config.resale];
            fairness += (8 - config.purchaseLimit) * 2;
            fairness += config.accessiblePercent * 1.2;
            fairness -= config.presalePercent > 30 ? (config.presalePercent - 30) * 0.5 : 0;
            const fairnessEstimate = Math.max(0, Math.min(100, Math.round(fairness)));

            const presalePressure = Math.round((config.presalePercent / 50) * 100);
            const accessCoverage = Math.round((config.accessiblePercent / 15) * 100);

            // Pre-run warnings — each has severity, label, cause, metric, priority
            const warnings = [];
            if (botExposure > 55) warnings.push({ severity: 'danger', label: 'Bot exposure high', cause: 'Current defense leaves automated traffic room.', metric: 'Bots Blocked', priority: 90 });
            if (fanFriction > 30) warnings.push({ severity: 'danger', label: 'Fan friction critical', cause: 'Verification and detection may block legit fans.', metric: 'Satisfaction', priority: 85 });
            if (config.waveCount === 1 && baseLoad > 4) warnings.push({ severity: 'danger', label: 'Single-wave load spike', cause: 'All demand hits the server at once.', metric: 'Stability', priority: 95 });
            if (config.resale === 'none' && resalePressure > 0.5) warnings.push({ severity: 'danger', label: 'Resale pressure unchecked', cause: 'Scalpers will flood secondary markets immediately.', metric: 'Fairness', priority: 80 });
            if (publicPercent < 55) warnings.push({ severity: 'warning', label: 'Public pool thin', cause: 'Presale allocation is squeezing general onsale.', metric: 'Fans Served', priority: 70 });
            if (config.presalePercent > 35) warnings.push({ severity: 'warning', label: 'Presale over-allocated', cause: 'Large presale leaves fewer public seats.', metric: 'Fairness', priority: 60 });
            if (config.accessiblePercent <= 2) warnings.push({ severity: 'warning', label: 'Accessibility low', cause: 'Reserved coverage is very thin.', metric: 'Fairness', priority: 40 });
            if (config.waitingRoomTime > 6 && level.id === 4) warnings.push({ severity: 'warning', label: 'Long lead time', cause: 'Short-notice demand does not benefit from long waits.', metric: 'Satisfaction', priority: 65 });
            if (config.waveCount > 5) warnings.push({ severity: 'warning', label: 'Too many waves', cause: 'Repeated stress on the system hurts stability.', metric: 'Stability', priority: 55 });
            if (config.waitingRoomTime > 12) warnings.push({ severity: 'warning', label: 'Waiting room too long', cause: 'Long lead time gives bots more setup time.', metric: 'Bots Blocked', priority: 50 });
            if (fanFriction > 20 && fanFriction <= 30) warnings.push({ severity: 'warning', label: 'Fan friction rising', cause: 'Verification stack starting to hurt satisfaction.', metric: 'Satisfaction', priority: 45 });
            warnings.sort((a, b) => b.priority - a.priority);

            return {
                botExposure, fanFriction, loadRisk, publicPercent, publicInventory,
                fairnessEstimate, presaleTickets, accessibleTickets,
                presalePressure, accessCoverage, warnings
            };
        }

        // Generate specific, actionable recommendation from result data
        function generateRecommendation(results, level, rank) {
            const c = results.config;
            const fansPct = results.fansServedPct;

            // Passing recommendations toward higher medals
            if (results.passed) {
                if (rank.tier >= 4) return 'Mastered. Try a tougher mission or a different strategy for style points.';
                if (rank.tier === 3) return 'Strong clear. Push satisfaction and stability higher for MASTERED.';
                // Clear: suggest specific push
                if (results.satisfaction < 75) return 'Cleared. Reduce friction (lighter verification or detection) to push satisfaction toward STRONG CLEAR.';
                if (results.siteStability < 70) return 'Cleared. Add another entry wave to strengthen stability toward STRONG CLEAR.';
                if (results.fairness < 80) return 'Cleared. Tighten purchase limit or resale policy to push fairness higher.';
                return 'Cleared. Try trimming presale allocation or adding accessibility coverage for STRONG CLEAR.';
            }

            // Failing recommendations — most specific first
            if (results.siteStability < 55 && c.waveCount < 3) {
                return `Add entry waves. A ${c.waveCount === 1 ? 'single wave' : 'small number of waves'} caused a load spike.`;
            }
            if (results.siteStability < 55 && c.waveCount > 5) {
                return 'Reduce entry waves. Too many waves are causing repeated stress on the system.';
            }
            if (results.botsBlockedPct < 55 && c.botDetection === 'low') {
                return 'Raise bot detection at least one step. Basic CAPTCHA is not enough for this threat level.';
            }
            if (results.botsBlockedPct < 60 && c.botDetection === 'medium' && level.botPressure > 0.4) {
                return 'Raise bot detection to Enhanced. Standard rate limits are getting overwhelmed.';
            }
            if (results.satisfaction < 55 && c.botDetection === 'aggressive') {
                return 'Lower bot detection one step. Aggressive filtering blocked bots but created too much fan friction.';
            }
            if (results.satisfaction < 55 && c.verification === 'verified' && level.botPressure < 0.5) {
                return 'Downgrade verification to Email. ID checks are overkill at this bot level and are hurting satisfaction.';
            }
            if (fansPct < 30 && c.presalePercent > 30) {
                return `Reduce presale allocation. ${c.presalePercent}% presale left public inventory too thin.`;
            }
            if (results.fairness < 55 && c.resale === 'none' && level.resalePressure > 0.5) {
                return 'Tighten resale restrictions. Resale pressure overwhelmed fairness — try Face Value or Cap.';
            }
            if (results.fairness < 55 && c.purchaseLimit > 4) {
                return `Lower the purchase limit. ${c.purchaseLimit} tickets per buyer is enabling bulk buying.`;
            }
            if (c.accessiblePercent <= 2) {
                return 'Add accessible coverage. Reserved inventory materially improves the fairness score.';
            }
            if (c.waitingRoomTime > 6) {
                return `Reduce waiting room time. ${c.waitingRoomTime}h opens the door too long for bots to prepare.`;
            }
            if (results.checkoutSuccessRate < 60) {
                return 'Checkout is choking. Reduce friction (lighter verification) or add waves to stabilize load.';
            }
            // Metric-specific fallback tied to the actual weakest metric
            const metrics = [
                { label: 'Fans Served', value: results.fansServedPct, fix: 'Reduce friction or improve checkout stability so more real fans complete.' },
                { label: 'Satisfaction', value: results.satisfaction, fix: 'Reduce verification friction or loosen overly strict controls.' },
                { label: 'Stability', value: results.siteStability, fix: 'Add waves or reduce repeated load spikes to strengthen stability.' },
                { label: 'Fairness', value: results.fairness, fix: 'Tighten resale, lower purchase limits, or shrink presale allocation.' },
                { label: 'Bots Blocked', value: results.botsBlockedPct, fix: 'Raise bot detection level or add fan verification.' },
                { label: 'Checkout', value: results.checkoutSuccessRate, fix: 'Reduce cumulative friction or add wave staggering.' }
            ];
            const weakest = metrics.sort((a, b) => a.value - b.value)[0];
            return `Your weakest metric was ${weakest.label}. ${weakest.fix}`;
        }

        function primaryFailureCause(results, level) {
            const metrics = [
                { key: 'fans', label: 'Fans Served', value: results.fansServedPct, weight: level.weights.fans, threshold: 30 },
                { key: 'bots', label: 'Bot Defense', value: results.botsBlockedPct, weight: level.weights.bots, threshold: 55 },
                { key: 'checkout', label: 'Checkout', value: results.checkoutSuccessRate, weight: level.weights.checkout, threshold: 60 },
                { key: 'satisfaction', label: 'Satisfaction', value: results.satisfaction, weight: level.weights.satisfaction, threshold: 55 },
                { key: 'stability', label: 'Site Stability', value: results.siteStability, weight: level.weights.stability, threshold: 55 },
                { key: 'fairness', label: 'Fairness', value: results.fairness, weight: level.weights.fairness, threshold: 55 }
            ];
            // Deficit weighted by lever weight
            const worst = metrics
                .map(m => ({ ...m, deficit: (m.threshold - m.value) * m.weight }))
                .filter(m => m.deficit > 0)
                .sort((a, b) => b.deficit - a.deficit)[0];
            if (!worst) return null;

            let detail = '';
            if (worst.key === 'stability' && results.serverLoad > 70) detail = 'Server load exceeded capacity.';
            else if (worst.key === 'satisfaction') detail = 'Legitimate fans were frustrated by friction and checkout failures.';
            else if (worst.key === 'fairness') detail = 'Distribution felt lopsided — scalpers, groups, or presale absorbed too much.';
            else if (worst.key === 'fans') detail = 'Too few real fans made it through the queue.';
            else if (worst.key === 'bots') detail = 'Bots grabbed a large share of tickets.';
            else if (worst.key === 'checkout') detail = 'Checkout failures cost fans their spot in queue.';

            return { label: worst.label, detail };
        }

        // ============================================================
        // SECTION 5 · UI PRIMITIVES
        // ============================================================

        function StatusChip({ label, value, status = 'neutral', showIcon = false }) {
            const colors = {
                good: 'text-green-400 border-green-400/40 bg-green-400/10',
                warning: 'text-amber-400 border-amber-400/40 bg-amber-400/10',
                danger: 'text-red-400 border-red-400/40 bg-red-400/10',
                neutral: 'text-slate-400 border-slate-600 bg-slate-800/50',
                info: 'text-cyan-400 border-cyan-400/40 bg-cyan-400/10'
            };
            return (

                    {showIcon && <Icon name="Activity" className="w-3.5 h-3.5" />}

        function RiskMeter({ label, value, max = 100, thresholds = { low: 30, high: 70 }, inverted = false, hint, flashClass }) {
            const pct = Math.min(100, Math.max(0, (value / max) * 100));
            let status = 'good';
            if (inverted) {
                if (pct >= thresholds.high) status = 'good';
                else if (pct >= thresholds.low) status = 'warning';
                else status = 'danger';
            } else {
                if (pct <= thresholds.low) status = 'good';
                else if (pct <= thresholds.high) status = 'warning';
                else status = 'danger';
            }
            const barColor = { good: 'bg-green-500', warning: 'bg-amber-500', danger: 'bg-red-500' }[status];
            const textColor = { good: 'text-green-400', warning: 'text-amber-400', danger: 'text-red-400' }[status];

            return (
                <div className={`space-y-1 rounded px-1 -mx-1 ${flashClass || ''}`}>
                    <div className="flex justify-between items-baseline">
                        <span className="text-xs text-slate-400">{label}</span>
                        <span className={`font-mono font-bold text-sm ${textColor}`}>
                            {value}{typeof max === 'number' && max === 100 ? '%' : ''}
                        </span>
                    </div>
                    <div className="h-2 bg-slate-800 rounded-full overflow-hidden border border-slate-700">
                        <div className={`h-full ${barColor} transition-all duration-300 ease-out`} style={{ width: `${pct}%` }}
                            role="progressbar" aria-valuenow={value} aria-valuemin={0} aria-valuemax={max} aria-label={label} />
                    </div>
                    {hint && <p className="text-xs text-slate-500 leading-tight">{hint}</p>}

            );

        function GameSlider({ label, value, onChange, min, max, step = 1, unit = '', helpText, id }) {
            const pct = ((value - min) / (max - min)) * 100;
            const sliderId = id || `slider-${label.replace(/\s+/g, '-').toLowerCase()}`;
            return (
                <div className="space-y-1">

                        <input id={sliderId} type="range" min={min} max={max} step={step} value={value}

                    {helpText && <p className="text-xs text-slate-500 leading-snug">{helpText}</p>}
                </div>

        // Segmented control with full arrow-key ARIA radio-group behavior
        function SegmentedControl({ options, value, onChange, label, columns }) {
            const cols = columns || options.length;
            const groupRef = useRef(null);
            const groupId = useMemo(() => `seg-${(label || 'group').replace(/\s+/g, '-').toLowerCase()}-${Math.random().toString(36).slice(2, 7)}`, [label]);

            const handleKeyDown = useCallback((e) => {
                const idx = options.findIndex(o => o.value === value);
                let nextIdx = idx;
                if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { nextIdx = (idx + 1) % options.length; e.preventDefault(); }
                else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { nextIdx = (idx - 1 + options.length) % options.length; e.preventDefault(); }
                else if (e.key === 'Home') { nextIdx = 0; e.preventDefault(); }
                else if (e.key === 'End') { nextIdx = options.length - 1; e.preventDefault(); }
                else return;

                onChange(options[nextIdx].value);
                // Move focus to the newly selected option
                requestAnimationFrame(() => {
                    const buttons = groupRef.current && groupRef.current.querySelectorAll('button[role="radio"]');
                    if (buttons && buttons[nextIdx]) buttons[nextIdx].focus();
                });
            }, [options, value, onChange]);

            return (
                <div>
                    {label && <label id={`${groupId}-label`} className="text-sm text-slate-300 font-medium mb-2 block">{label}</label>}
                    <div ref={groupRef} role="radiogroup" aria-labelledby={label ? `${groupId}-label` : undefined}
                        className="grid gap-1.5"
                        style={{ gridTemplateColumns: `repeat(${cols}, minmax(0, 1fr))` }}
                        onKeyDown={handleKeyDown}>
                        {options.map((option) => {
                            const selected = value === option.value;
                            return (
                                <button
                                    key={option.value}
                                    type="button"
                                    onClick={() => onChange(option.value)}
                                    role="radio"
                                    aria-checked={selected}
                                    tabIndex={selected ? 0 : -1}
                                    className={`py-2.5 px-2 rounded border transition-all text-left min-h-[56px] ${
                                        selected
                                            ? 'border-cyan-400 bg-cyan-500/20 text-white glow-cyan'
                                            : 'border-slate-700 bg-slate-800/40 text-slate-400 hover:border-slate-500 hover:bg-slate-800/70 hover:text-slate-300'
                                    }`}
                                >
                                    <div className={`font-bold text-sm ${selected ? 'text-cyan-300' : ''}`}>{option.label}</div>
                                    <div className="text-xs opacity-70 mt-0.5">{option.shortDesc}</div>
                                </button>
                            );
                        })}
                    </div>
                </div>
            );

        // Queue traffic visualization — reacts to config state
        function QueueTraffic({ config, projections, level }) {
            // Render N wave lanes, with fan/bot packets flowing toward gate/server
            const waves = Math.min(config.waveCount, 5);

            const lanes = Array.from({ length: waves }).map((_, i) => {

                return { id: i, packets: Math.min(8, packetsPerLane) };

            const serverTone = loadRisk > 65 ? 'red' : loadRisk > 35 ? 'amber' : 'green';
            const serverColorMap = {

        function ConfigurationScreen({ level, onRunSimulation, onBack, initialConfig }) {

            const [projPanelOpen, setProjPanelOpen] = useState(false);
            const [showAllAlerts, setShowAllAlerts] = useState(false);
            // Flash keyed by projection meter label -> class name
            const [flash, setFlash] = useState({});

            const projections = useMemo(() => calculateProjections(level, config), [level, config]);
            const prevProjRef = useRef(projections);

            // Trigger flash on affected meters when config changes
            useEffect(() => {
                const prev = prevProjRef.current;
                const next = projections;
                const flashes = {};
                if (prev.botExposure !== next.botExposure) flashes['Bot Exposure'] = next.botExposure < prev.botExposure ? 'flash-green' : 'flash-red';
                if (prev.fanFriction !== next.fanFriction) flashes['Fan Friction'] = next.fanFriction < prev.fanFriction ? 'flash-green' : 'flash-amber';
                if (prev.loadRisk !== next.loadRisk) flashes['Load Spike Risk'] = next.loadRisk < prev.loadRisk ? 'flash-green' : 'flash-amber';
                if (prev.fairnessEstimate !== next.fairnessEstimate) flashes['Fairness Projection'] = next.fairnessEstimate > prev.fairnessEstimate ? 'flash-green' : 'flash-amber';
                if (prev.presalePressure !== next.presalePressure) flashes['Presale Pressure'] = 'flash-cyan';
                if (prev.accessCoverage !== next.accessCoverage) flashes['Accessibility Coverage'] = 'flash-cyan';
                if (Object.keys(flashes).length > 0) {
                    setFlash(flashes);
                    const t = setTimeout(() => setFlash({}), 700);
                    prevProjRef.current = projections;
                    return () => clearTimeout(t);
                }
                prevProjRef.current = projections;
            }, [projections]);

            const updateConfig = useCallback((key, value) => setConfig(prev => ({ ...prev, [key]: value })), []);
            const handleReset = () => setConfig(DEFAULT_CONFIG);

            const WarningStack = ({ compact }) => (
                projections.warnings.length > 0 ? (
                    <div className={`flex flex-wrap gap-1.5 ${compact ? '' : 'mb-2'}`}>
                        {projections.warnings.map((w, i) => <WarningPill key={i} warning={w} />)}

                    <div className="text-xs text-green-400 flex items-center gap-1.5">
                        <Icon name="Check" className="w-3.5 h-3.5" />
                        <span>Configuration looks stable.</span>

            const AlertsPanel = () => {
                if (projections.warnings.length === 0) {
                    return (
                        <div className="p-2 rounded border border-green-500/30 bg-green-500/5 text-xs text-green-400 flex items-center gap-1.5">
                            <Icon name="Check" className="w-3.5 h-3.5" />
                            <span>All systems within tolerance.</span>
                        </div>
                    );

                const visible = showAllAlerts ? projections.warnings : projections.warnings.slice(0, 3);
                const hidden = projections.warnings.length - visible.length;
                return (
                    <div className="space-y-1.5">
                        {visible.map((w, i) => <WarningAlert key={i} warning={w} />)}
                        {hidden > 0 && !showAllAlerts && (
                            <button onClick={() => setShowAllAlerts(true)}
                                className="w-full text-xs text-slate-400 hover:text-cyan-400 py-1 border border-dashed border-slate-700 rounded">
                                + {hidden} more alert{hidden > 1 ? 's' : ''}
                            </button>
                        )}
                        {showAllAlerts && projections.warnings.length > 3 && (
                            <button onClick={() => setShowAllAlerts(false)}
                                className="w-full text-xs text-slate-500 hover:text-slate-300 py-1">
                                Show less
                            </button>
                        )}
                    </div>
                );

            const ProjectionsContent = () => (

                    <RiskMeter label="Bot Exposure" value={projections.botExposure} thresholds={{ low: 25, high: 55 }}

                    <RiskMeter label="Fan Friction" value={projections.fanFriction} thresholds={{ low: 12, high: 30 }}

                    <RiskMeter label="Load Spike Risk" value={projections.loadRisk} thresholds={{ low: 35, high: 65 }}
                        flashClass={flash['Load Spike Risk']}
                        hint={config.waveCount === 1 ? 'No staggering concentrates load.' :
                              config.waveCount >= 2 && config.waveCount <= 4 ? 'Waves spreading load nicely.' :
                              config.waveCount > 5 ? 'Too many waves stresses systems.' : null} />
                    <RiskMeter label="Fairness Projection" value={projections.fairnessEstimate} thresholds={{ low: 45, high: 70 }} inverted

                    <RiskMeter label="Presale Pressure" value={projections.presalePressure} thresholds={{ low: 30, high: 65 }}

                    <RiskMeter label="Accessibility Coverage" value={projections.accessCoverage} thresholds={{ low: 25, high: 55 }} inverted

                        <div className="flex justify-between text-xs">

                    <div className="pt-2 border-t border-slate-800">

                        <AlertsPanel />

            return (

                            <button onClick={handleReset}

                                <Icon name="Refresh" className="w-3.5 h-3.5" />
                                <span className="hidden sm:inline">Reset</span>
                            </button>

                    <div className="max-w-6xl mx-auto p-3 md:p-4">
                        <PressureHUD level={level} projections={projections} config={config} />

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-3 md:gap-4">
                            <div className="lg:col-span-2 space-y-3 md:space-y-4">

        function SimulationScreen({ level, config, onComplete }) {

                const proj = calculateProjections(level, config);
                const heavyLoad = proj.loadRisk > 65;
                const highBots = proj.botExposure > 55;
                const wavesActive = config.waveCount > 1;
                const thinPublic = proj.publicPercent < 55;
                return [
                    { label: 'Opening waiting room...', detail: `${config.waitingRoomTime}h before doors`, icon: 'Clock', tone: 'cyan' },
                    { label: highBots ? 'Bots flooding filter...' : 'Bot filter engaged...',
                      detail: highBots ? 'High leakage detected' : 'Nominal filter response', icon: 'Bot', tone: highBots ? 'red' : 'green' },
                    { label: wavesActive ? `Releasing ${config.waveCount} waves...` : 'Single-wave release...',
                      detail: wavesActive ? `${config.waveInterval}m stagger` : 'All fans at once', icon: 'Users', tone: wavesActive ? 'cyan' : 'amber' },
                    { label: heavyLoad ? 'Server load peaking...' : 'Checkout stable...',
                      detail: heavyLoad ? 'Stress on infrastructure' : 'Load within tolerance', icon: 'Server', tone: heavyLoad ? 'red' : 'green' },
                    { label: thinPublic ? 'Public inventory tight...' : 'Allocating tickets...',
                      detail: thinPublic ? 'Presale ate the public pool' : `${proj.publicInventory.toLocaleString()} public seats`, icon: 'Ticket', tone: thinPublic ? 'amber' : 'cyan' }
                ];
            }, [level, config]);

            useEffect(() => {
                const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
                const interval = reduced ? 60 : 350;
                let i = 0;
                const timer = setInterval(() => {
                    i++;
                    if (i >= phases.length) {
                        clearInterval(timer);
                        setTimeout(onComplete, reduced ? 60 : 350);
                    } else {
                        setPhase(i);
                    }
                }, interval);
                return () => clearInterval(timer);
            }, [onComplete, phases.length]);

            const toneMap = {
                cyan: { ring: 'border-cyan-500/50', bg: 'bg-cyan-500/10', text: 'text-cyan-400', pulse: 'border-cyan-500/30' },
                amber: { ring: 'border-amber-500/50', bg: 'bg-amber-500/10', text: 'text-amber-400', pulse: 'border-amber-500/30' },
                red: { ring: 'border-red-500/50', bg: 'bg-red-500/10', text: 'text-red-400', pulse: 'border-red-500/30' },
                green: { ring: 'border-green-500/50', bg: 'bg-green-500/10', text: 'text-green-400', pulse: 'border-green-500/30' }
            };
            const current = phases[phase];
            const t = toneMap[current.tone];

            return (
                <div className="min-h-screen grid-bg flex items-center justify-center p-6">
                    <div className="text-center max-w-sm w-full">
                        <div className={`w-20 h-20 mx-auto mb-5 rounded-full border-2 ${t.ring} ${t.bg} flex items-center justify-center ${t.text} relative`}>
                            <Icon name={current.icon} className="w-10 h-10" />
                            <div className={`absolute inset-0 rounded-full border-2 ${t.pulse} animate-ping`} />
                        </div>
                        <div className="text-[10px] font-mono uppercase tracking-widest text-slate-500 mb-1">Onsale in Progress</div>
                        <h2 className="text-lg font-bold text-white mb-1">{current.label}</h2>
                        <p className={`text-xs ${t.text} mb-6 font-mono`}>{current.detail}</p>

                        <div className="w-full h-1.5 bg-slate-800 rounded-full overflow-hidden">
                            <div className="h-full bg-cyan-500 transition-all duration-300"
                                style={{ width: `${((phase + 1) / phases.length) * 100}%` }} />
                        </div>
                        <div className="flex justify-center gap-1.5 mt-3">
                            {phases.map((_, i) => (
                                <div key={i} className={`w-1.5 h-1.5 rounded-full transition-all ${i <= phase ? 'bg-cyan-500' : 'bg-slate-700'}`} />
                            ))}
                        </div>

                        <div className="mt-6 space-y-1">
                            {phases.slice(0, phase + 1).map((p, i) => (
                                <div key={i} className={`text-left text-[11px] font-mono px-2 py-1 rounded ${i === phase ? 'bg-slate-800/80' : 'opacity-50'}`}>
                                    <span className={toneMap[p.tone].text}>▸</span>
                                    <span className="text-slate-300 ml-2">{p.label}</span>
                                    <span className="text-slate-500 ml-2">— {p.detail}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function ResultsScreen({ level, results, onAdjust, onResetTry, onNextLevel, onLevelSelect, hasNextLevel, isNewBest }) {
            const [showDetails, setShowDetails] = useState(false);
            useEffect(() => {
                const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
                const t = setTimeout(() => setShowDetails(true), reduced ? 50 : 500);
                return () => clearTimeout(t);
            }, []);

            const rank = getRank(results.overallScore, level.parScore);
            const nextThreshold = nextRankThreshold(results.overallScore, level.parScore);

            const getMetricStatus = (value, thresholds) => {
                if (value >= thresholds.good) return 'good';
                if (value >= thresholds.warn) return 'warning';
                return 'danger';
            };

            const metrics = [
                { label: 'Fans Served', displayValue: results.realFansServed.toLocaleString(), displayMax: results.totalSeats, pct: results.fansServedPct, icon: 'Users', status: getMetricStatus(results.fansServedPct, { good: 50, warn: 25 }) },
                { label: 'Bots Blocked', displayValue: `${results.botsBlockedPct}%`, pct: results.botsBlockedPct, icon: 'Shield', status: getMetricStatus(results.botsBlockedPct, { good: 70, warn: 50 }) },
                { label: 'Checkout Rate', displayValue: `${results.checkoutSuccessRate}%`, pct: results.checkoutSuccessRate, icon: 'Check', status: getMetricStatus(results.checkoutSuccessRate, { good: 70, warn: 50 }) },
                { label: 'Satisfaction', displayValue: `${results.satisfaction}`, pct: results.satisfaction, icon: 'Heart', status: getMetricStatus(results.satisfaction, { good: 65, warn: 45 }) },
                { label: 'Stability', displayValue: `${results.siteStability}`, pct: results.siteStability, icon: 'Server', status: getMetricStatus(results.siteStability, { good: 60, warn: 40 }) },
                { label: 'Fairness', displayValue: `${results.fairness}`, pct: results.fairness, icon: 'Scale', status: getMetricStatus(results.fairness, { good: 70, warn: 50 }) }
            ];

            const sortedImpacts = [...results.leverImpacts].sort((a, b) => b.impact - a.impact);
            const bestDecision = sortedImpacts[0];
            const worstDecision = sortedImpacts[sortedImpacts.length - 1];
            const primaryCause = !results.passed ? primaryFailureCause(results, level) : null;
            const recommendation = generateRecommendation(results, level, rank);

            const rankBorder = {
                red: 'border-red-500/50', amber: 'border-amber-500/50',
                green: 'border-green-500/50', cyan: 'border-cyan-500/50', gold: 'border-amber-400/50'
            }[rank.color];
            const rankBg = {
                red: 'bg-red-500/10', amber: 'bg-amber-500/10',
                green: 'bg-green-500/10', cyan: 'bg-cyan-500/10', gold: 'bg-amber-400/10'
            }[rank.color];
            const rankText = {
                red: 'text-red-400', amber: 'text-amber-400',
                green: 'text-green-400', cyan: 'text-cyan-400', gold: 'text-amber-300'
            }[rank.color];

            return (
                <div className="min-h-screen grid-bg p-3 md:p-6">
                    <div className="max-w-4xl mx-auto">
                        <div className={`panel mb-4 overflow-hidden ${rankBorder}`}>
                            <div className={`p-4 md:p-5 ${rankBg}`}>
                                <div className="flex items-center justify-between gap-3 flex-wrap">
                                    <div className="flex items-center gap-3 md:gap-4">
                                        <MedalBadge rank={rank} size="md" />
                                        <div>
                                            <div className={`text-xs font-mono uppercase tracking-wider ${rankText}`}>
                                                {results.passed ? 'Objective Achieved' : 'Mission Failed'}
                                            </div>
                                            <div className="text-3xl md:text-4xl font-bold text-white font-mono tabular-nums">
                                                {results.overallScore}
                                                <span className="text-lg md:text-xl text-slate-500"> / {level.parScore}</span>
                                            </div>
                                            {isNewBest && (
                                                <div className="text-xs font-mono text-amber-300 mt-0.5 animate-blink">NEW BEST SCORE</div>
                                            )}
                                            {nextThreshold && (
                                                <div className="text-[11px] text-slate-400 mt-1">
                                                    +{nextThreshold.needed} to <span className="font-mono font-bold text-cyan-400">{nextThreshold.label}</span>
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    {results.passed && hasNextLevel && (
                                        <div className="px-3 py-1.5 rounded border border-cyan-500/50 bg-cyan-500/10 text-cyan-400 text-xs font-mono uppercase tracking-wider">
                                            Next Mission Unlocked
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                        {showDetails && (
                            <>
                                <div className="grid grid-cols-2 md:grid-cols-3 gap-2.5 mb-4">
                                    {metrics.map((m, i) => {
                                        const colors = {
                                            good: { text: 'text-green-400', bar: 'bg-green-500' },
                                            warning: { text: 'text-amber-400', bar: 'bg-amber-500' },
                                            danger: { text: 'text-red-400', bar: 'bg-red-500' }
                                        }[m.status];
                                        return (
                                            <div key={i} className="panel p-3">
                                                <div className="flex items-center justify-between mb-1.5">
                                                    <span className="text-[10px] uppercase tracking-wider text-slate-400">{m.label}</span>
                                                    <span className={colors.text}><Icon name={m.icon} className="w-3.5 h-3.5" /></span>
                                                </div>
                                                <div className={`text-xl md:text-2xl font-bold ${colors.text} font-mono tabular-nums truncate`}>
                                                    {m.displayValue}
                                                    {m.displayMax && <span className="text-xs text-slate-500"> / {m.displayMax.toLocaleString()}</span>}
                                                </div>
                                                <div className="h-1 bg-slate-800 rounded-full overflow-hidden mt-1.5">
                                                    <div className={`h-full ${colors.bar} transition-all duration-700`} style={{ width: `${m.pct}%` }} />
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>

                                {results.trace && results.trace.length > 0 && (
                                    <div className="panel mb-4">
                                        <div className="panel-header">
                                            <span className="text-xs uppercase tracking-wider font-semibold">Simulation Trace</span>
                                        </div>
                                        <div className="p-3 space-y-1.5">
                                            {results.trace.map((t, i) => {
                                                const toneClass = { red: 'text-red-400', amber: 'text-amber-400', green: 'text-green-400', cyan: 'text-cyan-400' }[t.tone] || 'text-slate-400';
                                                return (
                                                    <div key={i} className="flex items-start gap-2 text-xs">
                                                        <span className={`${toneClass} font-mono mt-0.5`}>▸</span>
                                                        <div className="min-w-0">
                                                            <span className={`font-mono text-[10px] uppercase tracking-wider ${toneClass}`}>{t.label}</span>
                                                            <span className="text-slate-300 ml-2">{t.detail}</span>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}

                                <div className="panel mb-4">
                                    <div className="panel-header">
                                        <span className="text-xs uppercase tracking-wider font-semibold">Operations Debrief</span>
                                    </div>
                                    <div className="p-4 space-y-3">
                                        {primaryCause && (
                                            <div className="flex items-start gap-3 p-3 rounded border border-red-500/30 bg-red-500/5">
                                                <span className="text-red-400 shrink-0 mt-0.5"><Icon name="Alert" className="w-4 h-4" /></span>
                                                <div className="min-w-0">
                                                    <div className="text-[10px] font-mono uppercase tracking-wider text-red-400 mb-0.5">Primary Failure Cause</div>
                                                    <div className="text-sm text-white">{primaryCause.label} fell below target. {primaryCause.detail}</div>
                                                </div>
                                            </div>
                                        )}

                                        <div className="grid md:grid-cols-2 gap-3">
                                            {bestDecision && bestDecision.impact > 0 && (
                                                <div className="flex items-start gap-3 p-3 rounded border border-green-500/30 bg-green-500/5">
                                                    <span className="text-green-400 shrink-0 mt-0.5"><Icon name="Check" className="w-4 h-4" /></span>
                                                    <div className="min-w-0">
                                                        <div className="text-[10px] font-mono uppercase tracking-wider text-green-400 mb-0.5">Best Decision</div>
                                                        <div className="text-sm text-white font-semibold">{bestDecision.lever}: {bestDecision.label}</div>
                                                        <div className="text-xs text-slate-400 mt-0.5">{bestDecision.why}</div>
                                                    </div>
                                                </div>
                                            )}

                                            {worstDecision && worstDecision.impact < 0 && (
                                                <div className="flex items-start gap-3 p-3 rounded border border-amber-500/30 bg-amber-500/5">
                                                    <span className="text-amber-400 shrink-0 mt-0.5"><Icon name="X" className="w-4 h-4" /></span>
                                                    <div className="min-w-0">
                                                        <div className="text-[10px] font-mono uppercase tracking-wider text-amber-400 mb-0.5">Most Costly Decision</div>
                                                        <div className="text-sm text-white font-semibold">{worstDecision.lever}: {worstDecision.label}</div>
                                                        <div className="text-xs text-slate-400 mt-0.5">{worstDecision.why}</div>
                                                    </div>
                                                </div>
                                            )}
                                        </div>

                                        <div className="flex items-start gap-3 p-3 rounded border border-cyan-500/30 bg-cyan-500/5">
                                            <span className="text-cyan-400 shrink-0 mt-0.5"><Icon name="Target" className="w-4 h-4" /></span>
                                            <div className="min-w-0">
                                                <div className="text-[10px] font-mono uppercase tracking-wider text-cyan-400 mb-0.5">Recommended Adjustment</div>
                                                <div className="text-sm text-white">{recommendation}</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </>
                        )}

                        <div className="grid grid-cols-2 md:flex md:flex-wrap md:justify-center gap-2 md:gap-3">
                            <button onClick={onAdjust}
                                className="flex items-center justify-center gap-2 px-4 py-3 bg-slate-700 hover:bg-slate-600 rounded font-semibold text-sm transition-all">
                                <Icon name="Activity" className="w-4 h-4" />
                                <span>Adjust Setup</span>
                            </button>
                            <button onClick={onResetTry}
                                className="flex items-center justify-center gap-2 px-4 py-3 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded font-semibold text-sm transition-all border border-slate-700">
                                <Icon name="Refresh" className="w-4 h-4" />
                                <span>Reset Setup</span>
                            </button>
                            <button onClick={onLevelSelect}
                                className="flex items-center justify-center gap-2 px-4 py-3 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded font-semibold text-sm transition-all border border-slate-700">
                                <Icon name="Layers" className="w-4 h-4" />
                                <span>Missions</span>
                            </button>
                            {results.passed && hasNextLevel && (
                                <button onClick={onNextLevel}
                                    className="col-span-2 md:col-span-1 flex items-center justify-center gap-2 px-4 py-3 bg-cyan-500 hover:bg-cyan-400 text-terminal-bg font-bold text-sm rounded transition-all glow-cyan">
                                    <span>Next Mission</span>
                                    <Icon name="ArrowRight" className="w-4 h-4" />
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ============================================================
        // SECTION 7 · MAIN APP
        // ============================================================

        function App() {
            const [screen, setScreen] = useState('title');
            const [currentLevel, setCurrentLevel] = useState(null);
            const [bestScores, setBestScores] = useState({});
            const [results, setResults] = useState(null);
            const [pendingConfig, setPendingConfig] = useState(null);
            const [lastConfig, setLastConfig] = useState(null);
            const [isNewBest, setIsNewBest] = useState(false);

            const handleSelectLevel = useCallback((level) => {
                setCurrentLevel(level);
                setLastConfig(null);
                setScreen('briefing');
            }, []);

            const handleRunSimulation = useCallback((config) => {
                setPendingConfig(config);
                setScreen('simulating');
            }, []);

            const handleSimulationComplete = useCallback(() => {
                const simResults = runSimulation(currentLevel, pendingConfig);
                setResults(simResults);
                setLastConfig(pendingConfig);
                const previousBest = bestScores[currentLevel.id] || 0;
                if (simResults.overallScore > previousBest) {
                    setBestScores(prev => ({ ...prev, [currentLevel.id]: simResults.overallScore }));
                    setIsNewBest(true);
                } else {
                    setIsNewBest(false);
                }
                setScreen('results');
            }, [currentLevel, pendingConfig, bestScores]);

            const handleNextLevel = useCallback(() => {
                const currentIndex = LEVELS.findIndex(l => l.id === currentLevel.id);
                if (currentIndex < LEVELS.length - 1) {
                    setCurrentLevel(LEVELS[currentIndex + 1]);
                    setLastConfig(null);
                    setScreen('briefing');
                }
            }, [currentLevel]);

            const hasNextLevel = useMemo(() => {
                if (!currentLevel) return false;
                const idx = LEVELS.findIndex(l => l.id === currentLevel.id);
                return idx < LEVELS.length - 1;
            }, [currentLevel]);

            const handleAdjust = useCallback(() => setScreen('config'), []);
            const handleResetTry = useCallback(() => { setLastConfig(null); setScreen('config'); }, []);

            return (
                <div className="min-h-screen bg-terminal-bg">
                    {screen === 'title' && <TitleScreen onStart={() => setScreen('levelSelect')} />}
                    {screen === 'levelSelect' && (
                        <LevelSelect levels={LEVELS} bestScores={bestScores}
                            onSelectLevel={handleSelectLevel} onBack={() => setScreen('title')} />
                    )}
                    {screen === 'briefing' && currentLevel && (
                        <BriefingScreen level={currentLevel}
                            onContinue={() => setScreen('config')} onBack={() => setScreen('levelSelect')} />
                    )}
                    {screen === 'config' && currentLevel && (
                        <ConfigurationScreen level={currentLevel} initialConfig={lastConfig}
                            onRunSimulation={handleRunSimulation} onBack={() => setScreen('briefing')} />
                    )}
                    {screen === 'simulating' && currentLevel && pendingConfig && (
                        <SimulationScreen level={currentLevel} config={pendingConfig} onComplete={handleSimulationComplete} />
                    )}
                    {screen === 'results' && currentLevel && results && (
                        <ResultsScreen level={currentLevel} results={results}
                            onAdjust={handleAdjust} onResetTry={handleResetTry}
                            onNextLevel={handleNextLevel} onLevelSelect={() => setScreen('levelSelect')}
                            hasNextLevel={hasNextLevel} isNewBest={isNewBest} />
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
